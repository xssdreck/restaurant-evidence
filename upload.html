<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>手机证据上传</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Noto Sans CJK SC",sans-serif; margin: 20px; line-height: 1.5; }
    .card { max-width: 720px; margin: 0 auto; padding: 16px; border: 1px solid #ddd; border-radius: 12px; }
    label { display:block; font-weight: 600; margin-top: 12px; }
    input, select, button, textarea { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { background: #111; color: #fff; font-weight: 700; border: none; margin-top: 16px; }
    button:disabled { opacity: .6; }
    .muted { color:#666; font-size: 14px; }
    .ok { color: #0a7a32; }
    .err { color: #b00020; }
    ul { padding-left: 20px; }
    code { background:#f6f6f6; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>手机证据上传（GitHub）</h2>
    <p class="muted">把图片/视频直接上传到仓库 <code>xssdreck/restaurant-evidence</code>。建议先在手机上打码再上传。</p>

    <label>GitHub Token（需要 repo 权限）</label>
    <input id="token" type="password" placeholder="粘贴你的 PAT（不会保存）" autocomplete="off" />

    <label>仓库</label>
    <input id="repo" value="xssdreck/restaurant-evidence" />

    <label>分支</label>
    <input id="branch" value="main" />

    <label>上传目录</label>
    <input id="folder" value="evidence" />

    <label>证据前缀（可选，如 E-022）</label>
    <input id="prefix" placeholder="例如 E-022" />

    <label>选择文件（支持手机拍照/选图）</label>
    <input id="files" type="file" multiple accept="image/*,video/*,.pdf" capture="environment" />

    <button id="uploadBtn">开始上传</button>
    <p id="status" class="muted"></p>
    <ul id="result"></ul>

    <hr />
    <p class="muted"><strong>安全提示：</strong>Token 只在当前页面内存中使用，不会写入本仓库。上传完成后请在 GitHub 设置里撤销或轮换 token。</p>
    <p class="muted">创建 Token：GitHub → Settings → Developer settings → Personal access tokens（Classic）→ 勾选 <code>repo</code>。</p>
  </div>

<script>
function ext(name){ const i=name.lastIndexOf('.'); return i>=0?name.slice(i):''; }
function slug(s){ return s.replace(/[^a-zA-Z0-9._-]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''); }
function ts(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`; }
function b64(file){ return new Promise((resolve,reject)=>{ const r=new FileReader(); r.onload=()=>resolve(r.result.split(',')[1]); r.onerror=reject; r.readAsDataURL(file); }); }

const btn = document.getElementById('uploadBtn');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');

btn.onclick = async () => {
  const token = document.getElementById('token').value.trim();
  const repo = document.getElementById('repo').value.trim();
  const branch = document.getElementById('branch').value.trim() || 'main';
  const folder = slug(document.getElementById('folder').value.trim() || 'evidence');
  const prefixRaw = document.getElementById('prefix').value.trim();
  const prefix = prefixRaw ? slug(prefixRaw) + '_' : '';
  const files = document.getElementById('files').files;

  resultEl.innerHTML='';
  if(!token){ statusEl.className='err'; statusEl.textContent='请先输入 GitHub Token'; return; }
  if(!repo || !repo.includes('/')){ statusEl.className='err'; statusEl.textContent='仓库格式应为 owner/repo'; return; }
  if(!files.length){ statusEl.className='err'; statusEl.textContent='请先选择文件'; return; }

  btn.disabled = true;
  statusEl.className='muted';
  statusEl.textContent=`准备上传 ${files.length} 个文件...`;

  let ok = 0;
  for(let i=0;i<files.length;i++){
    const f = files[i];
    const clean = slug(f.name.replace(ext(f.name),'')) || `file-${i+1}`;
    const filename = `${prefix}${ts()}_${clean}${ext(f.name)}`;
    const path = `${folder}/${filename}`;
    try{
      statusEl.textContent = `上传中 (${i+1}/${files.length})：${f.name}`;
      const content = await b64(f);
      const res = await fetch(`https://api.github.com/repos/${repo}/contents/${encodeURIComponent(path)}`, {
        method:'PUT',
        headers:{
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type':'application/json'
        },
        body: JSON.stringify({
          message: `upload evidence: ${filename}`,
          content,
          branch
        })
      });
      const data = await res.json();
      if(!res.ok){ throw new Error(data.message || '上传失败'); }
      ok++;
      const li = document.createElement('li');
      li.innerHTML = `<span class="ok">✔ ${f.name}</span><br><a href="${data.content.html_url}" target="_blank">${data.content.path}</a>`;
      resultEl.appendChild(li);
    }catch(e){
      const li = document.createElement('li');
      li.innerHTML = `<span class="err">✘ ${f.name}：${e.message}</span>`;
      resultEl.appendChild(li);
    }
  }

  statusEl.className = ok === files.length ? 'ok' : 'err';
  statusEl.textContent = `完成：成功 ${ok} / ${files.length}`;
  btn.disabled = false;
};
</script>
</body>
</html>
