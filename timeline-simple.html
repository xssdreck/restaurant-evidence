<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件时间线</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .timeline-line { position: absolute; left: 24px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #dc2626, #991b1b); }
        .timeline-dot { position: absolute; left: 16px; width: 18px; height: 18px; border-radius: 50%; background: white; border: 3px solid #dc2626; z-index: 10; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-gradient-to-r from-red-700 to-red-900 text-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <i class="fas fa-scale-balanced text-white text-2xl mr-3"></i>
                    <h1 class="text-xl font-bold">事件时间线 & 证据整理</h1>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="./index.html" class="px-4 py-2 text-white hover:text-gray-200 transition"><i class="fas fa-arrow-left mr-2"></i>返回首页</a>
                    <button onclick="exportData()" class="px-4 py-2 text-white hover:text-gray-200 transition"><i class="fas fa-download mr-2"></i>导出数据</button>
                    <button onclick="document.getElementById('importFile').click()" class="px-4 py-2 text-white hover:text-gray-200 transition"><i class="fas fa-upload mr-2"></i>导入数据</button>
                    <input type="file" id="importFile" accept=".json" onchange="importData(event)" class="hidden">
                    <button onclick="generatePDF()" class="px-4 py-2 bg-white text-red-700 rounded-lg hover:bg-gray-100 transition shadow-md"><i class="fas fa-file-pdf mr-2"></i>导出PDF</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-md p-6 sticky top-24">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                        <i class="fas fa-plus-circle text-red-600 mr-2"></i>添加事件
                    </h2>
                    
                    <form id="eventForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">日期时间 *</label>
                            <input type="datetime-local" id="eventDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">事件标题 *</label>
                            <input type="text" id="eventTitle" placeholder="简要描述事件" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">详细描述</label>
                            <textarea id="eventDesc" rows="4" placeholder="详细描述事件经过..." class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-tag mr-1"></i>标签</label>
                            <div class="flex flex-wrap gap-2" id="tagButtons">
                                <button type="button" data-tag="关键证据" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">关键证据</button>
                                <button type="button" data-tag="证人证言" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">证人证言</button>
                                <button type="button" data-tag="视频证据" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">视频证据</button>
                                <button type="button" data-tag="书面材料" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">书面材料</button>
                                <button type="button" data-tag="物证" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">物证</button>
                            </div>
                        </div>
                        <button type="submit" class="w-full py-3 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition"><i class="fas fa-save mr-2"></i>保存事件</button>
                    </form>
                    
                    <div class="mt-6 pt-6 border-t">
                        <h3 class="text-sm font-medium text-gray-700 mb-3">统计信息</h3>
                        <div class="bg-red-50 rounded-lg p-3 text-center">
                            <div class="text-2xl font-bold text-red-600" id="totalEvents">0</div>
                            <div class="text-xs text-gray-600">事件总数</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-md p-4 mb-6">
                    <div class="flex items-center space-x-4">
                        <span class="text-sm font-medium text-gray-700">筛选：</span>
                        <select id="filterTag" onchange="renderTimeline()" class="px-3 py-1.5 border rounded-lg text-sm">
                            <option value="">全部标签</option>
                            <option value="关键证据">关键证据</option>
                            <option value="证人证言">证人证言</option>
                            <option value="视频证据">视频证据</option>
                            <option value="书面材料">书面材料</option>
                            <option value="物证">物证</option>
                        </select>
                        <input type="text" id="searchText" placeholder="搜索事件..." onkeyup="renderTimeline()" class="px-3 py-1.5 border rounded-lg text-sm">
                    </div>
                </div>
                
                <div id="timelineContainer" class="relative"><div class="timeline-line"></div></div>
                
                <div id="emptyState" class="text-center py-16">
                    <i class="fas fa-clipboard-list text-6xl text-gray-200 mb-4"></i>
                    <h3 class="text-lg font-medium text-gray-600 mb-2">暂无事件记录</h3>
                    <p class="text-gray-400">点击左侧表单添加第一个事件</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        var events = JSON.parse(localStorage.getItem('timelineEvents') || '[]');

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderTimeline();
            updateStats();
            document.getElementById('eventForm').addEventListener('submit', addEvent);
            
            // 绑定标签按钮
            document.querySelectorAll('.tag-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    this.classList.toggle('active');
                    this.classList.toggle('bg-red-100');
                    this.classList.toggle('border-red-500');
                    this.classList.toggle('text-red-600');
                });
            });
        });

        // 添加事件
        function addEvent(e) {
            e.preventDefault();
            var event = {
                id: Date.now(),
                date: document.getElementById('eventDate').value,
                title: document.getElementById('eventTitle').value,
                description: document.getElementById('eventDesc').value,
                tags: Array.from(document.querySelectorAll('.tag-btn.active')).map(function(btn) { return btn.getAttribute('data-tag'); }),
                createdAt: new Date().toISOString()
            };
            events.push(event);
            events.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
            localStorage.setItem('timelineEvents', JSON.stringify(events));
            renderTimeline();
            updateStats();
            document.getElementById('eventForm').reset();
            document.querySelectorAll('.tag-btn').forEach(function(btn) {
                btn.classList.remove('active', 'bg-red-100', 'border-red-500', 'text-red-600');
            });
            showToast('事件已添加', 'success');
        }

        // 渲染时间线
        function renderTimeline() {
            var container = document.getElementById('timelineContainer');
            var filterTag = document.getElementById('filterTag').value;
            var searchText = document.getElementById('searchText').value.toLowerCase();
            
            var filteredEvents = events.filter(function(event) {
                var matchTag = !filterTag || event.tags.includes(filterTag);
                var matchSearch = !searchText || 
                    event.title.toLowerCase().includes(searchText) || 
                    (event.description || '').toLowerCase().includes(searchText);
                return matchTag && matchSearch;
            });
            
            if (filteredEvents.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                container.innerHTML = '<div class="timeline-line"></div>';
                return;
            }
            
            document.getElementById('emptyState').style.display = 'none';
            
            var html = '<div class="timeline-line"></div>';
            filteredEvents.forEach(function(event, index) {
                html += '<div class="relative pl-16 pb-8">';
                html += '<div class="timeline-dot" style="top: 8px;"></div>';
                html += '<div class="bg-white rounded-xl shadow-md p-6">';
                html += '<div class="flex justify-between items-start mb-3">';
                html += '<div>';
                html += '<span class="text-sm text-red-600 font-medium"><i class="far fa-clock mr-1"></i>' + formatDate(event.date) + '</span>';
                html += '<h3 class="text-lg font-semibold text-gray-900 mt-1">' + escapeHtml(event.title) + '</h3>';
                html += '</div>';
                html += '<button onclick="deleteEvent(' + event.id + ')" class="text-gray-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button>';
                html += '</div>';
                html += '<p class="text-gray-600 mb-4 whitespace-pre-wrap">' + escapeHtml(event.description || '') + '</p>';
                if (event.tags.length > 0) {
                    html += '<div class="flex flex-wrap gap-2">';
                    event.tags.forEach(function(tag) {
                        html += '<span class="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-full">' + tag + '</span>';
                    });
                    html += '</div>';
                }
                html += '</div></div>';
            });
            container.innerHTML = html;
        }

        // 格式化日期
        function formatDate(dateStr) {
            var date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', weekday: 'long' });
        }

        // 转义HTML
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 删除事件
        function deleteEvent(id) {
            if (!confirm('确定要删除这个事件吗？')) return;
            events = events.filter(function(e) { return e.id !== id; });
            localStorage.setItem('timelineEvents', JSON.stringify(events));
            renderTimeline();
            updateStats();
            showToast('事件已删除', 'info');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalEvents').textContent = events.length;
        }

        // 导出数据
        function exportData() {
            var dataStr = JSON.stringify(events, null, 2);
            var blob = new Blob([dataStr], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = '事件数据_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据导出成功', 'success');
        }

        // 导入数据
        function importData(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        events = imported;
                        localStorage.setItem('timelineEvents', JSON.stringify(events));
                        renderTimeline();
                        updateStats();
                        showToast('数据导入成功', 'success');
                    } else {
                        throw new Error('格式错误');
                    }
                } catch (err) {
                    showToast('导入失败: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
        }

        // 生成PDF
        function generatePDF() {
            if (events.length === 0) {
                showToast('没有可导出的事件', 'error');
                return;
            }
            var printWindow = window.open('', '_blank');
            if (!printWindow) {
                showToast('请允许弹出窗口', 'error');
                return;
            }
            
            var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>事件时间线</title>';
            html += '<style>body{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;padding:40px;max-width:800px;margin:0 auto}';
            html += 'h1{color:#dc2626;text-align:center;border-bottom:2px solid #dc2626;padding-bottom:10px}';
            html += '.event{margin-bottom:20px;border-bottom:1px solid #eee;padding-bottom:15px}';
            html += '.title{font-size:18px;font-weight:bold;color:#000}';
            html += '.date{color:#dc2626;font-size:14px}';
            html += '.desc{color:#333;margin:8px 0;white-space:pre-wrap}';
            html += '.tags{color:#666;font-size:12px}';
            html += '.footer{margin-top:30px;padding-top:15px;border-top:2px solid #dc2626;color:#999;text-align:center;font-size:12px}';
            html += '</style></head><body>';
            html += '<h1>事件时间线及证据清单</h1>';
            html += '<p style="text-align:center;color:#666">生成日期：' + new Date().toLocaleDateString('zh-CN') + '</p>';
            
            events.forEach(function(e, i) {
                html += '<div class="event">';
                html += '<div class="title">' + (i + 1) + '. ' + e.title + '</div>';
                html += '<div class="date">时间：' + formatDate(e.date) + '</div>';
                if (e.description) html += '<div class="desc">' + e.description + '</div>';
                if (e.tags.length) html += '<div class="tags">标签：' + e.tags.join('、') + '</div>';
                html += '</div>';
            });
            
            html += '<div class="footer"><p>本文件由事件时间线系统生成</p>';
            html += '<p>共计 ' + events.length + ' 个事件</p></div>';
            html += '<script>window.onload=function(){setTimeout(function(){window.print()},500)};<\/script>';
            html += '</body></html>';
            
            printWindow.document.write(html);
            printWindow.document.close();
            showToast('PDF打印窗口已打开', 'success');
        }

        // 显示提示
        function showToast(message, type) {
            var colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            var toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 ' + colors[type] + ' text-white px-6 py-3 rounded-lg shadow-lg z-50';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }
    </script>
</body>
</html>
