<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>管理员审核</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;max-width:980px;margin:24px auto;padding:0 16px}.card{border:1px solid #ddd;border-radius:10px;padding:12px;margin:10px 0}button{padding:7px 10px;border-radius:8px;border:1px solid #ccc;background:#111;color:#fff;margin-right:6px}.muted{color:#666}</style></head><body>
<h2>管理员审核</h2><p class="muted">仅管理员邮箱可审核。</p><p id="msg" class="muted"></p><div id="list"></div>
<p><a href="./auth.html">登录/注册</a> · <a href="./">回首页</a></p>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script>
<script>
const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
const msg=document.getElementById('msg'); const list=document.getElementById('list');
const say=t=>msg.textContent=t;
async function me(){ const {data}=await sb.auth.getUser(); return data?.user; }
async function load(){
 const user=await me(); if(!user){ say('请先登录'); return; }
 if(!window.ADMIN_EMAILS.includes(user.email)){ say('你不是管理员：'+user.email); return; }
 say('管理员：'+user.email);
 const {data,error}=await sb.from('stories').select('*').order('created_at',{ascending:false}).limit(100);
 if(error){ say('读取失败：'+error.message); return; }
 list.innerHTML=data.map(x=>`<div class='card'><div><b>${x.title}</b> <span class='muted'>[${x.status}]</span></div><div class='muted'>${x.user_email||''} · ${new Date(x.created_at).toLocaleString('zh-CN')}</div><p>${(x.content||'').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</p><button onclick="setStatus('${x.id}','approved')">通过</button><button onclick="setStatus('${x.id}','rejected')">驳回</button><button onclick="setStatus('${x.id}','pending')">改回待审</button></div>`).join('');
}
window.setStatus = async (id,status)=>{
 const user=await me(); if(!user||!window.ADMIN_EMAILS.includes(user.email)){alert('无权限');return;}
 const {error}=await sb.from('stories').update({status}).eq('id',id);
 if(error){alert('更新失败：'+error.message);return;}
 load();
}
load();
</script></body></html>
