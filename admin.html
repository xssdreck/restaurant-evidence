<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>管理员审核</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;max-width:980px;margin:24px auto;padding:0 16px}.card{border:1px solid #ddd;border-radius:10px;padding:12px;margin:10px 0}button{padding:7px 10px;border-radius:8px;border:1px solid #ccc;background:#111;color:#fff;margin-right:6px;cursor:pointer}.muted{color:#666}.err{color:#b91c1c}</style></head><body>
<h2>管理员审核</h2>
<p class="muted">安全模式：仅允许已登录且邮箱在管理员白名单内的用户审核。</p>
<p id="msg" class="muted"></p><div id="list"></div>
<p><a href="./auth.html">登录/注册</a> · <a href="./">回首页</a></p>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script>
<script>
const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
const msg=document.getElementById('msg'); const list=document.getElementById('list');
const ADMIN_EMAILS = (window.ADMIN_EMAILS || []).map(x => String(x || '').toLowerCase());
const say=(t,err=false)=>{msg.textContent=t; msg.className=err?'err':'muted';};

async function getCurrentUser(){
  const { data, error } = await sb.auth.getUser();
  if(error) throw error;
  return data?.user || null;
}

function isAdmin(user){
  const email = String(user?.email || '').toLowerCase();
  return !!email && ADMIN_EMAILS.includes(email);
}

async function load(){
  let user;
  try {
    user = await getCurrentUser();
  } catch (e) {
    say('读取登录状态失败：' + (e.message || e), true);
    return;
  }

  if(!user){
    say('请先登录管理员账号。', true);
    list.innerHTML = '';
    return;
  }

  if(!isAdmin(user)){
    say('当前账号无管理员权限：' + user.email, true);
    list.innerHTML = '';
    return;
  }

  say('管理员：' + user.email + ' · 正在加载投稿...');
  const {data,error}=await sb.from('stories').select('*').order('created_at',{ascending:false}).limit(100);
  if(error){ say('读取失败：'+error.message,true); return; }

  say('共 '+(data?.length||0)+' 条投稿');
  list.innerHTML=(data||[]).map(x=>`<div class='card'><div><b>${x.title}</b> <span class='muted'>[${x.status}]</span></div><div class='muted'>${x.user_email||''} · ${new Date(x.created_at).toLocaleString('zh-CN')}</div><p>${(x.content||'').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</p><button onclick="setStatus('${x.id}','approved')">通过</button><button onclick="setStatus('${x.id}','rejected')">驳回</button><button onclick="setStatus('${x.id}','pending')">待审</button></div>`).join('');
}

window.setStatus = async (id,status)=>{
  const user = await getCurrentUser();
  if(!user || !isAdmin(user)){ alert('无管理员权限'); return; }
  const {error} = await sb.from('stories').update({status}).eq('id', id);
  if(error){ alert('操作失败：'+error.message+'（请检查 RLS 策略 / 管理员邮箱）'); return; }
  load();
}

load();
</script></body></html>
