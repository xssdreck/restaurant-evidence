<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>管理员审核后台</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;max-width:1100px;margin:24px auto;padding:0 16px}
    .muted{color:#666}
    .err{color:#b91c1c}
    .ok{color:#065f46}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0 14px}
    button{padding:6px 10px;border-radius:8px;border:1px solid #d1d5db;background:#111;color:#fff;cursor:pointer}
    button.secondary{background:#fff;color:#111}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{border-bottom:1px solid #e5e7eb;padding:10px;vertical-align:top;text-align:left}
    th{background:#f9fafb;position:sticky;top:0}
    .status{font-weight:600}
    .pill{padding:2px 8px;border-radius:999px;font-size:12px;display:inline-block}
    .pending{background:#fff7ed;color:#9a3412}
    .approved{background:#ecfdf5;color:#065f46}
    .rejected{background:#fef2f2;color:#991b1b}
    .snippet{max-width:420px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .actions{display:flex;gap:6px;flex-wrap:wrap}
    details{margin-top:6px}
  </style>
</head>
<body>
  <h2>管理员审核后台（列表）</h2>
  <p class="muted">仅允许管理员邮箱登录后操作。你要的“文章列表显示”已启用。</p>

  <div class="toolbar">
    <button id="reloadBtn" class="secondary" type="button">刷新列表</button>
    <span id="meta" class="muted"></span>
  </div>

  <p id="msg" class="muted"></p>

  <table>
    <thead>
      <tr>
        <th style="width:56px;">#</th>
        <th style="width:140px;">状态</th>
        <th>标题 / 内容</th>
        <th style="width:180px;">作者</th>
        <th style="width:170px;">时间</th>
        <th style="width:280px;">操作</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="6" class="muted">加载中...</td></tr>
    </tbody>
  </table>

  <p style="margin-top:12px"><a href="./auth.html">登录/注册</a> · <a href="./">回首页</a></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script>
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    const ADMIN_EMAILS = (window.ADMIN_EMAILS || []).map(x => String(x || '').toLowerCase());
    const msg = document.getElementById('msg');
    const meta = document.getElementById('meta');
    const rows = document.getElementById('rows');

    const say = (t, cls='muted') => { msg.textContent = t; msg.className = cls; };
    const fmt = (d) => new Date(d).toLocaleString('zh-CN');

    async function getUser(){
      const { data, error } = await sb.auth.getUser();
      if(error) throw error;
      return data?.user || null;
    }

    function isAdmin(user){
      const email = String(user?.email || '').toLowerCase();
      return !!email && ADMIN_EMAILS.includes(email);
    }

    function statusPill(status){
      const s = String(status || 'pending');
      return `<span class="pill ${s}">${s}</span>`;
    }

    function render(list){
      if(!list.length){
        rows.innerHTML = '<tr><td colspan="6" class="muted">暂无投稿</td></tr>';
        return;
      }
      rows.innerHTML = list.map((x, i) => {
        const title = (x.title || '').replace(/</g,'&lt;');
        const content = (x.content || '').replace(/</g,'&lt;');
        const snippet = content.slice(0, 80);
        return `<tr>
          <td>${i + 1}</td>
          <td class="status">${statusPill(x.status)}</td>
          <td>
            <div><strong>${title || '(无标题)'}</strong></div>
            <div class="snippet muted">${snippet}</div>
            <details><summary>展开全文</summary><div style="white-space:pre-wrap;margin-top:6px">${content}</div></details>
          </td>
          <td>${(x.user_email || '').replace(/</g,'&lt;')}</td>
          <td>${fmt(x.created_at)}</td>
          <td>
            <div class="actions">
              <button type="button" data-id="${x.id}" data-status="approved">通过</button>
              <button type="button" data-id="${x.id}" data-status="rejected">驳回</button>
              <button type="button" data-id="${x.id}" data-status="pending" class="secondary">待审</button>
              <button type="button" data-id="${x.id}" data-action="delete" class="secondary">删除</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    async function load(){
      const user = await getUser();
      if(!user){
        say('请先登录管理员账号。', 'err');
        rows.innerHTML = '<tr><td colspan="6" class="muted">未登录</td></tr>';
        return;
      }
      if(!isAdmin(user)){
        say('当前账号无管理员权限：' + user.email, 'err');
        rows.innerHTML = '<tr><td colspan="6" class="muted">无管理员权限</td></tr>';
        return;
      }

      meta.textContent = '管理员：' + user.email;
      say('加载中...');
      const { data, error } = await sb.from('stories').select('*').order('created_at', { ascending:false }).limit(200);
      if(error){
        say('读取失败：' + error.message, 'err');
        rows.innerHTML = '<tr><td colspan="6" class="muted">读取失败</td></tr>';
        return;
      }
      render(data || []);
      say('共 ' + (data?.length || 0) + ' 条投稿', 'ok');
    }

    async function setStatus(id, status){
      const user = await getUser();
      if(!user || !isAdmin(user)){
        say('无管理员权限', 'err');
        return;
      }
      say('正在更新状态为 ' + status + ' ...');

      // 优先调用管理员 RPC（更稳），失败再 fallback update
      let rpcError = null;
      const rpc = await sb.rpc('admin_set_story_status', { p_story_id: id, p_status: status });
      if(rpc.error) rpcError = rpc.error;

      if(rpcError){
        const { error } = await sb.from('stories').update({ status }).eq('id', id);
        if(error){
          say('操作失败：' + (rpcError.message || error.message), 'err');
          return;
        }
      }

      say('更新成功：' + status, 'ok');
      await load();
    }

    document.getElementById('reloadBtn').addEventListener('click', () => load());

    async function deleteStory(id){
      const user = await getUser();
      if(!user || !isAdmin(user)){
        say('无管理员权限', 'err');
        return;
      }
      if(!confirm('确认删除这篇投稿？删除后不可恢复。')) return;
      say('正在删除...');
      const { error } = await sb.from('stories').delete().eq('id', id);
      if(error){
        say('删除失败：' + error.message, 'err');
        return;
      }
      say('删除成功', 'ok');
      await load();
    }

    rows.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-id]');
      if(!btn) return;
      btn.disabled = true;
      try {
        if (btn.dataset.action === 'delete') {
          await deleteStory(btn.dataset.id);
        } else if (btn.dataset.status) {
          await setStatus(btn.dataset.id, btn.dataset.status);
        }
      } finally {
        btn.disabled = false;
      }
    });

    load();
  </script>
</body>
</html>
