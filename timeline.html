<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件时间线 - 登录版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .timeline-line { position: absolute; left: 24px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #dc2626, #991b1b); }
        .timeline-dot { position: absolute; left: 16px; width: 18px; height: 18px; border-radius: 50%; background: white; border: 3px solid #dc2626; z-index: 10; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 加载界面 -->
    <div id="loadingScreen" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600 mx-auto mb-4"></div>
            <p class="text-gray-600">正在检查登录状态...</p>
        </div>
    </div>

    <!-- 未登录界面 -->
    <div id="loginScreen" class="hidden min-h-screen bg-gray-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full text-center">
            <i class="fas fa-lock text-5xl text-red-600 mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">请先登录</h2>
            <p class="text-gray-600 mb-6">事件时间线功能需要登录后才能使用</p>
            <a href="./auth.html" class="inline-block px-6 py-3 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition w-full">
                <i class="fas fa-sign-in-alt mr-2"></i>前往登录
            </a>
            <div class="mt-4">
                <a href="./index.html" class="text-gray-500 hover:text-gray-700 text-sm">← 返回首页</a>
            </div>
        </div>
    </div>

    <!-- 主应用界面 -->
    <div id="appScreen" class="hidden">
        <nav class="bg-gradient-to-r from-red-700 to-red-900 text-white shadow-sm sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center">
                        <i class="fas fa-scale-balanced text-white text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold">事件时间线</h1>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span id="userEmail" class="text-sm opacity-80 hidden sm:inline"></span>
                        <a href="./index.html" class="px-4 py-2 text-white hover:text-gray-200 transition">返回首页</a>
                        <button onclick="exportData()" class="px-4 py-2 text-white hover:text-gray-200 transition"><i class="fas fa-download mr-1"></i>导出</button>
                        <input type="file" id="importFile" accept=".json" onchange="importData(this)" class="hidden">
                        <button onclick="document.getElementById('importFile').click()" class="px-4 py-2 text-white hover:text-gray-200 transition"><i class="fas fa-upload mr-1"></i>导入</button>
                        <button onclick="generatePDF()" class="px-4 py-2 bg-white text-red-700 rounded-lg hover:bg-gray-100 transition"><i class="fas fa-file-pdf mr-1"></i>PDF</button>
                        <button onclick="logout()" class="px-4 py-2 text-white hover:text-gray-200 transition" title="退出"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- 左侧表单 -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl shadow-md p-6 sticky top-24">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                            <i class="fas fa-plus-circle text-red-600 mr-2"></i>添加事件
                        </h2>
                        
                        <form id="eventForm" onsubmit="return saveEvent(event)">
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">日期时间 *</label>
                                <input type="datetime-local" id="eventDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                            </div>
                            
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">事件标题 *</label>
                                <input type="text" id="eventTitle" placeholder="简要描述事件" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                            </div>
                            
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">详细描述</label>
                                <textarea id="eventDesc" rows="4" placeholder="详细描述事件经过..." class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500"></textarea>
                            </div>
                            
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-tag mr-1"></i>标签</label>
                                <div class="flex flex-wrap gap-2" id="tagContainer">
                                    <button type="button" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">关键证据</button>
                                    <button type="button" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">证人证言</button>
                                    <button type="button" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">视频证据</button>
                                    <button type="button" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">书面材料</button>
                                    <button type="button" class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">物证</button>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1"><i class="fas fa-paperclip mr-1"></i>照片/视频证据</label>
                                <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-red-500 transition cursor-pointer" onclick="document.getElementById('mediaFiles').click()">
                                    <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                    <p class="text-sm text-gray-600">点击上传照片或视频</p>
                                    <p class="text-xs text-gray-400 mt-1">支持 JPG, PNG, MP4, MOV (最大 50MB)</p>
                                </div>
                                <input type="file" id="mediaFiles" multiple accept="image/*,video/*" class="hidden" onchange="handleMediaSelect(event)">
                                <div id="mediaPreview" class="mt-2 grid grid-cols-3 gap-2"></div>
                            </div>
                            
                            <button type="submit" id="saveBtn" class="w-full py-3 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition">
                                <i class="fas fa-save mr-2"></i>保存事件
                            </button>
                        </form>
                        
                        <div class="mt-6 pt-6 border-t">
                            <h3 class="text-sm font-medium text-gray-700 mb-3">统计信息</h3>
                            <div class="bg-red-50 rounded-lg p-3 text-center">
                                <div class="text-2xl font-bold text-red-600" id="totalEvents">0</div>
                                <div class="text-xs text-gray-600">事件总数</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧时间线 -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-xl shadow-md p-4 mb-6">
                        <div class="flex items-center space-x-4">
                            <span class="text-sm font-medium text-gray-700">筛选：</span>
                            <select id="filterTag" onchange="renderTimeline()" class="px-3 py-1.5 border rounded-lg text-sm">
                                <option value="">全部标签</option>
                                <option value="关键证据">关键证据</option>
                                <option value="证人证言">证人证言</option>
                                <option value="视频证据">视频证据</option>
                                <option value="书面材料">书面材料</option>
                                <option value="物证">物证</option>
                            </select>
                            <input type="text" id="searchText" placeholder="搜索事件..." onkeyup="renderTimeline()" class="px-3 py-1.5 border rounded-lg text-sm flex-1">
                        </div>
                    </div>
                    
                    <div id="timelineContainer" class="relative"><div class="timeline-line"></div></div>
                    
                    <div id="emptyState" class="text-center py-16">
                        <i class="fas fa-clipboard-list text-6xl text-gray-200 mb-4"></i>
                        <h3 class="text-lg font-medium text-gray-600 mb-2">暂无事件记录</h3>
                        <p class="text-gray-400">点击左侧表单添加第一个事件</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    
    <script>
        var supabaseClient = null;
        var currentUser = null;
        var events = [];
        var selectedFiles = []; // 存储选中的媒体文件
        var uploadedMedia = []; // 存储已上传的媒体URL
        
        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // 检查配置
                if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
                    showError('Supabase 配置未加载');
                    return;
                }
                
                // 创建客户端
                supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
                
                // 获取当前用户
                var result = await supabaseClient.auth.getUser();
                var user = result.data.user;
                
                if (!user) {
                    // 未登录
                    document.getElementById('loadingScreen').classList.add('hidden');
                    document.getElementById('loginScreen').classList.remove('hidden');
                    return;
                }
                
                // 已登录
                currentUser = user;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                
                // 加载数据
                await loadEvents();
                
                // 绑定标签按钮
                document.querySelectorAll('.tag-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        this.classList.toggle('active');
                        this.classList.toggle('bg-red-100');
                        this.classList.toggle('border-red-500');
                        this.classList.toggle('text-red-600');
                    });
                });
                
            } catch (err) {
                console.error('初始化错误:', err);
                showError(err.message);
            }
        });
        
        // 加载事件
        async function loadEvents() {
            try {
                var result = await supabaseClient
                    .from('timeline_events')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('event_date', { ascending: true });
                
                if (result.error) throw result.error;
                
                events = result.data || [];
                renderTimeline();
                updateStats();
                
            } catch (err) {
                console.error('加载数据失败:', err);
                showToast('加载数据失败: ' + err.message, 'error');
            }
        }
        
        // 处理媒体文件选择
        function handleMediaSelect(event) {
            var files = Array.from(event.target.files);
            var maxSize = 50 * 1024 * 1024; // 50MB
            
            files.forEach(function(file) {
                if (file.size > maxSize) {
                    showToast('文件 ' + file.name + ' 超过50MB限制', 'error');
                    return;
                }
                
                selectedFiles.push(file);
                
                // 创建预览
                var reader = new FileReader();
                reader.onload = function(e) {
                    var div = document.createElement('div');
                    div.className = 'relative group';
                    div.id = 'media-' + selectedFiles.length;
                    
                    if (file.type.startsWith('image/')) {
                        div.innerHTML = '<img src="' + e.target.result + '" class="w-full h-20 object-cover rounded-lg border"><button type="button" onclick="removeMedia(' + (selectedFiles.length - 1) + ')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button>';
                    } else {
                        div.innerHTML = '<div class="w-full h-20 bg-gray-100 rounded-lg border flex flex-col items-center justify-center"><i class="fas fa-video text-2xl text-gray-400"></i><span class="text-xs text-gray-500 mt-1 truncate w-full text-center px-1">' + file.name + '</span></div><button type="button" onclick="removeMedia(' + (selectedFiles.length - 1) + ')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button>';
                    }
                    
                    document.getElementById('mediaPreview').appendChild(div);
                };
                reader.readAsDataURL(file);
            });
            
            event.target.value = '';
        }
        
        // 移除媒体文件
        function removeMedia(index) {
            selectedFiles.splice(index, 1);
            renderMediaPreview();
        }
        
        // 重新渲染媒体预览
        function renderMediaPreview() {
            var container = document.getElementById('mediaPreview');
            container.innerHTML = '';
            
            selectedFiles.forEach(function(file, index) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var div = document.createElement('div');
                    div.className = 'relative group';
                    
                    if (file.type.startsWith('image/')) {
                        div.innerHTML = '<img src="' + e.target.result + '" class="w-full h-20 object-cover rounded-lg border"><button type="button" onclick="removeMedia(' + index + ')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button>';
                    } else {
                        div.innerHTML = '<div class="w-full h-20 bg-gray-100 rounded-lg border flex flex-col items-center justify-center"><i class="fas fa-video text-2xl text-gray-400"></i><span class="text-xs text-gray-500 mt-1 truncate w-full text-center px-1">' + file.name + '</span></div><button type="button" onclick="removeMedia(' + index + ')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button>';
                    }
                    
                    container.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }
        
        // 上传媒体文件到 Supabase Storage
        async function uploadMediaFiles() {
            uploadedMedia = [];
            
            for (var i = 0; i < selectedFiles.length; i++) {
                var file = selectedFiles[i];
                var fileExt = file.name.split('.').pop();
                var fileName = currentUser.id + '/' + Date.now() + '_' + i + '.' + fileExt;
                
                try {
                    var result = await supabaseClient.storage
                        .from('timeline-evidence')
                        .upload(fileName, file, {
                            contentType: file.type,
                            upsert: false
                        });
                    
                    if (result.error) throw result.error;
                    
                    // 获取公开URL
                    var urlResult = supabaseClient.storage
                        .from('timeline-evidence')
                        .getPublicUrl(fileName);
                    
                    uploadedMedia.push({
                        name: file.name,
                        type: file.type,
                        url: urlResult.data.publicUrl,
                        path: fileName
                    });
                } catch (err) {
                    console.error('上传失败:', err);
                    showToast('上传文件失败: ' + file.name, 'error');
                }
            }
            
            return uploadedMedia;
        }
        
        // 保存事件
        async function saveEvent(e) {
            e.preventDefault();
            
            var btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>保存中...';
            
            try {
                var tags = [];
                document.querySelectorAll('.tag-btn.active').forEach(function(btn) {
                    tags.push(btn.textContent);
                });
                
                var eventData = {
                    user_id: currentUser.id,
                    user_email: currentUser.email,
                    title: document.getElementById('eventTitle').value,
                    description: document.getElementById('eventDesc').value,
                    event_date: document.getElementById('eventDate').value,
                    tags: tags,
                    evidence: []
                };
                
                // 上传媒体文件
                if (selectedFiles.length > 0) {
                    showToast('正在上传 ' + selectedFiles.length + ' 个文件...', 'info');
                    var uploadedFiles = await uploadMediaFiles();
                    eventData.evidence = uploadedFiles;
                }
                
                var result = await supabaseClient.from('timeline_events').insert(eventData);
                if (result.error) throw result.error;
                
                // 重置表单
                document.getElementById('eventForm').reset();
                document.querySelectorAll('.tag-btn').forEach(function(btn) {
                    btn.classList.remove('active', 'bg-red-100', 'border-red-500', 'text-red-600');
                });
                selectedFiles = [];
                uploadedMedia = [];
                document.getElementById('mediaPreview').innerHTML = '';
                
                showToast('事件已保存', 'success');
                await loadEvents();
                
            } catch (err) {
                console.error('保存失败:', err);
                showToast('保存失败: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save mr-2"></i>保存事件';
            }
            
            return false;
        }
        
        // 渲染时间线
        function renderTimeline() {
            var container = document.getElementById('timelineContainer');
            var filterTag = document.getElementById('filterTag').value;
            var searchText = document.getElementById('searchText').value.toLowerCase();
            
            var filteredEvents = events.filter(function(event) {
                var matchTag = !filterTag || (event.tags && event.tags.indexOf(filterTag) !== -1);
                var matchSearch = !searchText || 
                    event.title.toLowerCase().indexOf(searchText) !== -1 || 
                    (event.description && event.description.toLowerCase().indexOf(searchText) !== -1);
                return matchTag && matchSearch;
            });
            
            if (filteredEvents.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                container.innerHTML = '<div class="timeline-line"></div>';
                return;
            }
            
            document.getElementById('emptyState').style.display = 'none';
            
            var html = '<div class="timeline-line"></div>';
            filteredEvents.forEach(function(event, index) {
                html += '<div class="relative pl-16 pb-8">';
                html += '<div class="timeline-dot" style="top: 8px;"></div>';
                html += '<div class="bg-white rounded-xl shadow-md p-6">';
                html += '<div class="flex justify-between items-start mb-3">';
                html += '<div>';
                html += '<span class="text-sm text-red-600 font-medium"><i class="far fa-clock mr-1"></i>' + formatDate(event.event_date) + '</span>';
                html += '<h3 class="text-lg font-semibold text-gray-900 mt-1">' + escapeHtml(event.title) + '</h3>';
                html += '</div>';
                html += '<button onclick="deleteEvent(\'' + event.id + '\')" class="text-gray-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button>';
                html += '</div>';
                if (event.description) {
                    html += '<p class="text-gray-600 mb-4 whitespace-pre-wrap">' + escapeHtml(event.description) + '</p>';
                }
                if (event.tags && event.tags.length > 0) {
                    html += '<div class="flex flex-wrap gap-2">';
                    event.tags.forEach(function(tag) {
                        html += '<span class="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-full">' + escapeHtml(tag) + '</span>';
                    });
                    html += '</div>';
                }
                
                // 显示媒体文件
                if (event.evidence && event.evidence.length > 0) {
                    html += '<div class="mt-4 pt-4 border-t">';
                    html += '<p class="text-sm font-medium text-gray-700 mb-2"><i class="fas fa-paperclip mr-1"></i>附件 (' + event.evidence.length + ')</p>';
                    html += '<div class="grid grid-cols-4 gap-2">';
                    event.evidence.forEach(function(file) {
                        if (file.type && file.type.startsWith('image/')) {
                            html += '<a href="' + file.url + '" target="_blank" class="block"><img src="' + file.url + '" class="w-full h-20 object-cover rounded-lg border hover:border-red-500 transition"></a>';
                        } else if (file.type && file.type.startsWith('video/')) {
                            html += '<a href="' + file.url + '" target="_blank" class="block"><div class="w-full h-20 bg-gray-100 rounded-lg border flex flex-col items-center justify-center hover:border-red-500 transition"><i class="fas fa-video text-2xl text-gray-400"></i><span class="text-xs text-gray-500 mt-1 truncate w-full text-center px-1">' + escapeHtml(file.name) + '</span></div></a>';
                        }
                    });
                    html += '</div></div>';
                }
                
                html += '</div></div>';
            });
            container.innerHTML = html;
        }
        
        // 格式化日期
        function formatDate(dateStr) {
            var date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { 
                year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', weekday: 'long' 
            });
        }
        
        // 转义HTML
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 删除事件
        async function deleteEvent(id) {
            if (!confirm('确定要删除这个事件吗？')) return;
            
            try {
                var result = await supabaseClient
                    .from('timeline_events')
                    .delete()
                    .eq('id', id)
                    .eq('user_id', currentUser.id);
                
                if (result.error) throw result.error;
                
                showToast('事件已删除', 'success');
                await loadEvents();
            } catch (err) {
                showToast('删除失败: ' + err.message, 'error');
            }
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('totalEvents').textContent = events.length;
        }
        
        // 导出数据
        function exportData() {
            var dataStr = JSON.stringify(events, null, 2);
            var blob = new Blob([dataStr], {type: 'application/json'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = '事件数据_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据导出成功', 'success');
        }
        
        // 导入数据
        async function importData(input) {
            var file = input.files[0];
            if (!file) return;
            
            var reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    var imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('格式错误');
                    
                    var count = 0;
                    for (var i = 0; i < imported.length; i++) {
                        var item = imported[i];
                        var eventData = {
                            user_id: currentUser.id,
                            user_email: currentUser.email,
                            title: item.title,
                            description: item.description || '',
                            event_date: item.date || item.event_date,
                            tags: item.tags || [],
                            evidence: item.evidence || []
                        };
                        var result = await supabaseClient.from('timeline_events').insert(eventData);
                        if (!result.error) count++;
                    }
                    
                    showToast('成功导入 ' + count + ' 个事件', 'success');
                    await loadEvents();
                } catch (err) {
                    showToast('导入失败: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }
        
        // 生成PDF
        function generatePDF() {
            if (events.length === 0) {
                showToast('没有可导出的事件', 'error');
                return;
            }
            
            var printWindow = window.open('', '_blank');
            if (!printWindow) {
                showToast('请允许弹出窗口', 'error');
                return;
            }
            
            var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>事件时间线</title>';
            html += '<style>body{font-family:"Microsoft YaHei",sans-serif;padding:40px;max-width:800px;margin:0 auto}';
            html += 'h1{color:#dc2626;text-align:center;border-bottom:2px solid #dc2626;padding-bottom:10px}';
            html += '.event{margin-bottom:20px;border-bottom:1px solid #eee;padding-bottom:15px}';
            html += '.title{font-size:18px;font-weight:bold}';
            html += '.date{color:#dc2626;font-size:14px;margin:5px 0}';
            html += '.desc{margin:8px 0;white-space:pre-wrap}';
            html += '.tags{color:#666;font-size:12px}';
            html += '.footer{margin-top:30px;padding-top:15px;border-top:2px solid #dc2626;color:#999;text-align:center;font-size:12px}';
            html += '</style></head><body>';
            html += '<h1>事件时间线及证据清单</h1>';
            html += '<p style="text-align:center;color:#666">生成日期：' + new Date().toLocaleDateString('zh-CN') + '</p>';
            
            events.forEach(function(e, i) {
                html += '<div class="event">';
                html += '<div class="title">' + (i + 1) + '. ' + e.title + '</div>';
                html += '<div class="date">时间：' + formatDate(e.event_date) + '</div>';
                if (e.description) html += '<div class="desc">' + e.description.replace(/</g, '&lt;') + '</div>';
                if (e.tags && e.tags.length) html += '<div class="tags">标签：' + e.tags.join('、') + '</div>';
                html += '</div>';
            });
            
            html += '<div class="footer"><p>本文件由事件时间线系统生成</p>';
            html += '<p>共计 ' + events.length + ' 个事件</p></div>';
            html += '</body></html>';
            
            printWindow.document.write(html);
            printWindow.document.close();
            showToast('PDF打印窗口已打开', 'success');
        }
        
        // 退出登录
        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }
        
        // 显示错误
        function showError(msg) {
            document.getElementById('loadingScreen').innerHTML = '<div class="text-center p-8"><i class="fas fa-exclamation-circle text-5xl text-red-500 mb-4"></i><h2 class="text-xl font-bold mb-2">加载失败</h2><p class="text-gray-600 mb-4">' + msg + '</p><button onclick="location.reload()" class="px-4 py-2 bg-red-600 text-white rounded-lg">重新加载</button><div class="mt-4"><a href="./auth.html" class="text-blue-600 hover:underline text-sm">前往登录页</a></div></div>';
        }
        
        // 显示提示
        function showToast(message, type) {
            var colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            var toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 ' + colors[type] + ' text-white px-6 py-3 rounded-lg shadow-lg z-50';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }
    </script>
</body>
</html>
