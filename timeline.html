<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件时间线 & 证据整理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .timeline-line {
            position: absolute;
            left: 24px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #dc2626, #991b1b);
        }
        .timeline-dot {
            position: absolute;
            left: 16px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            border: 3px solid #dc2626;
            z-index: 10;
        }
        .evidence-card {
            transition: all 0.3s ease;
        }
        .evidence-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .gh-nav {
            background: radial-gradient(1200px 320px at 20% -20%, #dc2626 0%, #991b1b 50%, #7f1d1d 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="gh-nav text-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <i class="fas fa-scale-balanced text-white text-2xl mr-3"></i>
                    <h1 class="text-xl font-bold">事件时间线 & 证据整理</h1>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="./index.html" class="px-4 py-2 text-white hover:text-gray-200 transition">
                        <i class="fas fa-arrow-left mr-2"></i>返回首页
                    </a>
                    <button onclick="showImportExport()" class="px-4 py-2 text-white hover:text-gray-200 transition">
                        <i class="fas fa-file-import mr-2"></i>导入/导出
                    </button>
                    <button onclick="generatePDF()" class="px-4 py-2 bg-white text-red-700 rounded-lg hover:bg-gray-100 transition shadow-md">
                        <i class="fas fa-file-pdf mr-2"></i>导出PDF
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 左侧：添加事件表单 -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-md p-6 sticky top-24">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                        <i class="fas fa-plus-circle text-red-600 mr-2"></i>
                        添加事件
                    </h2>
                    
                    <form id="eventForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">日期时间</label>
                            <input type="datetime-local" id="eventDate" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">事件标题</label>
                            <input type="text" id="eventTitle" placeholder="简要描述事件" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">详细描述</label>
                            <textarea id="eventDesc" rows="4" placeholder="详细描述事件经过..."
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500"></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-paperclip mr-1"></i>证据附件
                            </label>
                            <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-red-500 transition cursor-pointer"
                                 onclick="document.getElementById('evidenceFiles').click()">
                                <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                <p class="text-sm text-gray-600">点击上传图片或文件</p>
                                <p class="text-xs text-gray-400 mt-1">支持 JPG, PNG, PDF, DOC 等</p>
                            </div>
                            <input type="file" id="evidenceFiles" multiple accept="image/*,.pdf,.doc,.docx,.txt"
                                class="hidden" onchange="handleFileSelect(event)">
                            <div id="fileList" class="mt-2 space-y-1"></div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-tag mr-1"></i>标签
                            </label>
                            <div class="flex flex-wrap gap-2">
                                <button type="button" onclick="toggleTag(this, '关键证据')" 
                                    class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">关键证据</button>
                                <button type="button" onclick="toggleTag(this, '证人证言')" 
                                    class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">证人证言</button>
                                <button type="button" onclick="toggleTag(this, '视频证据')" 
                                    class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">视频证据</button>
                                <button type="button" onclick="toggleTag(this, '书面材料')" 
                                    class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">书面材料</button>
                                <button type="button" onclick="toggleTag(this, '物证')" 
                                    class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">物证</button>
                            </div>
                        </div>
                        
                        <button type="submit" 
                            class="w-full py-3 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition shadow-md">
                            <i class="fas fa-save mr-2"></i>保存事件
                        </button>
                    </form>
                    
                    <div class="mt-6 pt-6 border-t border-gray-200">
                        <h3 class="text-sm font-medium text-gray-700 mb-3">统计信息</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-red-50 rounded-lg p-3 text-center">
                                <div class="text-2xl font-bold text-red-600" id="totalEvents">0</div>
                                <div class="text-xs text-gray-600">事件总数</div>
                            </div>
                            <div class="bg-orange-50 rounded-lg p-3 text-center">
                                <div class="text-2xl font-bold text-orange-600" id="totalEvidence">0</div>
                                <div class="text-xs text-gray-600">证据数量</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：时间线展示 -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-md p-4 mb-6 flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center space-x-4">
                        <span class="text-sm font-medium text-gray-700">筛选：</span>
                        <select id="filterTag" onchange="renderTimeline()" 
                            class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-red-500">
                            <option value="">全部标签</option>
                            <option value="关键证据">关键证据</option>
                            <option value="证人证言">证人证言</option>
                            <option value="视频证据">视频证据</option>
                            <option value="书面材料">书面材料</option>
                            <option value="物证">物证</option>
                        </select>
                        <input type="text" id="searchText" placeholder="搜索事件..." onkeyup="renderTimeline()"
                            class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-red-500">
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="clearAllData()" class="px-3 py-1.5 text-red-600 hover:bg-red-50 rounded-lg text-sm transition">
                            <i class="fas fa-trash-alt mr-1"></i>清空
                        </button>
                        <button onclick="sortEvents()" class="px-3 py-1.5 text-gray-600 hover:bg-gray-100 rounded-lg text-sm transition">
                            <i class="fas fa-sort mr-1"></i>排序
                        </button>
                    </div>
                </div>
                
                <div id="timelineContainer" class="relative">
                    <div class="timeline-line"></div>
                </div>
                
                <div id="emptyState" class="text-center py-16">
                    <i class="fas fa-clipboard-list text-6xl text-gray-200 mb-4"></i>
                    <h3 class="text-lg font-medium text-gray-600 mb-2">暂无事件记录</h3>
                    <p class="text-gray-400">点击左侧表单添加第一个事件</p>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="text-center py-6 text-gray-500 text-sm border-t">
        <p>事件时间线 & 证据整理工具 | <a href="./index.html" class="text-red-600 hover:underline">返回首页</a></p>
    </footer>
    
    <!-- 图片预览 -->
    <div id="imageModal" class="fixed inset-0 bg-black bg-opacity-90 z-50 hidden flex items-center justify-center p-4">
        <button onclick="closeImageModal()" class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300">
            <i class="fas fa-times"></i>
        </button>
        <img id="modalImage" src="" alt="预览" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>
    
    <!-- 导入导出 -->
    <div id="importExportModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full">
            <div class="px-6 py-4 border-b">
                <h3 class="text-lg font-semibold">导入/导出数据</h3>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">导出数据 (JSON)</label>
                    <button onclick="exportData()" class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                        <i class="fas fa-download mr-2"></i>下载数据文件
                    </button>
                </div>
                <div class="border-t pt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">导入数据</label>
                    <input type="file" id="importFile" accept=".json" onchange="importData(event)"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                </div>
            </div>
            <div class="px-6 py-4 border-t bg-gray-50 rounded-b-xl text-right">
                <button onclick="closeImportExport()" class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg">关闭</button>
            </div>
        </div>
    </div>

    <script>
        let events = JSON.parse(localStorage.getItem('timelineEvents') || '[]');
        let currentFiles = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            renderTimeline();
            updateStats();
        });
        
        document.getElementById('eventForm').addEventListener('submit', function(e) {
            e.preventDefault();
            addEvent();
        });
        
        function addEvent() {
            const date = document.getElementById('eventDate').value;
            const title = document.getElementById('eventTitle').value;
            const desc = document.getElementById('eventDesc').value;
            const tags = Array.from(document.querySelectorAll('.tag-btn.active')).map(btn => btn.textContent.trim());
            
            const event = {
                id: Date.now(),
                date: date,
                title: title,
                description: desc,
                tags: tags,
                evidence: currentFiles,
                createdAt: new Date().toISOString()
            };
            
            events.push(event);
            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            saveData();
            renderTimeline();
            updateStats();
            
            document.getElementById('eventForm').reset();
            currentFiles = [];
            document.getElementById('fileList').innerHTML = '';
            document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active', 'bg-red-100', 'border-red-500', 'text-red-600'));
            
            showToast('事件已添加成功', 'success');
        }
        
        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentFiles.push({
                        name: file.name,
                        type: file.type,
                        data: e.target.result,
                        size: file.size
                    });
                    renderFileList();
                };
                reader.readAsDataURL(file);
            });
        }
        
        function renderFileList() {
            const container = document.getElementById('fileList');
            container.innerHTML = currentFiles.map((file, index) => `
                <div class="flex items-center justify-between bg-gray-50 px-3 py-2 rounded-lg text-sm">
                    <div class="flex items-center overflow-hidden">
                        <i class="fas ${getFileIcon(file.type)} text-gray-500 mr-2"></i>
                        <span class="truncate">${file.name}</span>
                    </div>
                    <button onclick="removeFile(${index})" class="text-red-500 hover:text-red-700 ml-2">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
        }
        
        function getFileIcon(type) {
            if (type.startsWith('image/')) return 'fa-image';
            if (type.includes('pdf')) return 'fa-file-pdf';
            if (type.includes('word') || type.includes('document')) return 'fa-file-word';
            return 'fa-file';
        }
        
        function removeFile(index) {
            currentFiles.splice(index, 1);
            renderFileList();
        }
        
        function toggleTag(btn, tag) {
            btn.classList.toggle('active');
            btn.classList.toggle('bg-red-100');
            btn.classList.toggle('border-red-500');
            btn.classList.toggle('text-red-600');
        }
        
        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            const filterTag = document.getElementById('filterTag').value;
            const searchText = document.getElementById('searchText').value.toLowerCase();
            
            let filteredEvents = events.filter(event => {
                const matchTag = !filterTag || event.tags.includes(filterTag);
                const matchSearch = !searchText || 
                    event.title.toLowerCase().includes(searchText) || 
                    event.description.toLowerCase().includes(searchText);
                return matchTag && matchSearch;
            });
            
            if (filteredEvents.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                container.innerHTML = '<div class="timeline-line"></div>';
                return;
            }
            
            document.getElementById('emptyState').style.display = 'none';
            
            container.innerHTML = '<div class="timeline-line"></div>' + 
                filteredEvents.map((event, index) => `
                    <div class="relative pl-16 pb-8">
                        <div class="timeline-dot" style="top: 8px;"></div>
                        <div class="evidence-card bg-white rounded-xl shadow-md p-6">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <span class="text-sm text-red-600 font-medium">
                                        <i class="far fa-clock mr-1"></i>
                                        ${formatDate(event.date)}
                                    </span>
                                    <h3 class="text-lg font-semibold text-gray-900 mt-1">${escapeHtml(event.title)}</h3>
                                </div>
                                <div class="flex space-x-2">
                                    <button onclick="editEvent(${event.id})" class="text-gray-400 hover:text-red-600 transition">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteEvent(${event.id})" class="text-gray-400 hover:text-red-600 transition">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </div>
                            
                            ${event.description ? `<p class="text-gray-600 mb-4 whitespace-pre-wrap">${escapeHtml(event.description)}</p>` : ''}
                            
                            ${event.tags.length > 0 ? `
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${event.tags.map(tag => `
                                        <span class="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-full">${tag}</span>
                                    `).join('')}
                                </div>
                            ` : ''}
                            
                            ${event.evidence.length > 0 ? `
                                <div class="border-t pt-4">
                                    <p class="text-sm font-medium text-gray-700 mb-2">
                                        <i class="fas fa-paperclip mr-1"></i>证据附件 (${event.evidence.length})
                                    </p>
                                    <div class="grid grid-cols-4 gap-2">
                                        ${event.evidence.map((file, fileIndex) => `
                                            <div class="relative group cursor-pointer" onclick="previewFile('${file.data}', '${file.type}')">
                                                ${file.type.startsWith('image/') ? `
                                                    <img src="${file.data}" alt="${file.name}" 
                                                        class="w-full h-20 object-cover rounded-lg border hover:border-red-500 transition">
                                                ` : `
                                                    <div class="w-full h-20 bg-gray-100 rounded-lg border flex flex-col items-center justify-center hover:border-red-500 transition">
                                                        <i class="fas ${getFileIcon(file.type)} text-2xl text-gray-400"></i>
                                                        <span class="text-xs text-gray-500 mt-1 px-1 truncate w-full text-center">${file.name}</span>
                                                    </div>
                                                `}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { 
                year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', weekday: 'long' 
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function editEvent(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;
            
            document.getElementById('eventDate').value = event.date;
            document.getElementById('eventTitle').value = event.title;
            document.getElementById('eventDesc').value = event.description;
            currentFiles = [...event.evidence];
            renderFileList();
            
            document.querySelectorAll('.tag-btn').forEach(btn => {
                if (event.tags.includes(btn.textContent.trim())) {
                    btn.classList.add('active', 'bg-red-100', 'border-red-500', 'text-red-600');
                }
            });
            
            deleteEvent(id, false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function deleteEvent(id, confirm = true) {
            if (confirm && !window.confirm('确定要删除这个事件吗？')) return;
            events = events.filter(e => e.id !== id);
            saveData();
            renderTimeline();
            updateStats();
            if (confirm) showToast('事件已删除', 'info');
        }
        
        function previewFile(data, type) {
            if (type.startsWith('image/')) {
                document.getElementById('modalImage').src = data;
                document.getElementById('imageModal').classList.remove('hidden');
            } else {
                window.open(data, '_blank');
            }
        }
        
        function closeImageModal() {
            document.getElementById('imageModal').classList.add('hidden');
        }
        
        async function generatePDF() {
            if (events.length === 0) {
                showToast('没有可导出的事件', 'error');
                return;
            }
            showToast('正在生成PDF...', 'info');
            
            let printContainer = document.getElementById('printContainer');
            if (printContainer) printContainer.remove();
            
            printContainer = document.createElement('div');
            printContainer.id = 'printContainer';
            printContainer.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:white;padding:40px;';
            document.body.appendChild(printContainer);
            
            const fontLink = document.createElement('link');
            fontLink.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap';
            fontLink.rel = 'stylesheet';
            document.head.appendChild(fontLink);
            await new Promise(r => setTimeout(r, 1000));
            
            printContainer.innerHTML = `
                <div style="font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;color:#000;line-height:1.6;font-size:14px;">
                    <div style="text-align:center;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid #dc2626;">
                        <h1 style="font-size:28px;margin:0 0 15px 0;font-weight:700;color:#dc2626;">事件时间线及证据清单</h1>
                        <p style="font-size:14px;color:#333;margin:0;"><strong>生成日期：</strong>${new Date().toLocaleDateString('zh-CN')}</p>
                    </div>
                    ${events.map((event, i) => `
                        <div style="margin-bottom:25px;padding-bottom:20px;border-bottom:1px solid #ccc;">
                            <div style="font-size:18px;font-weight:700;margin-bottom:10px;color:#000;">${i+1}. ${event.title}</div>
                            <div style="font-size:14px;color:#dc2626;margin-bottom:8px;"><strong>时间：</strong>${formatDate(event.date)}</div>
                            ${event.description ? `<div style="font-size:14px;margin-bottom:8px;white-space:pre-wrap;"><strong>详情：</strong>${event.description}</div>` : ''}
                            ${event.tags.length ? `<div style="font-size:13px;margin-bottom:8px;"><strong>标签：</strong>${event.tags.join('、')}</div>` : ''}
                            ${event.evidence.length ? `
                                <div style="margin-top:15px;">
                                    <div style="font-size:14px;font-weight:700;margin-bottom:10px;">证据附件（${event.evidence.length}个）</div>
                                    <div style="display:flex;flex-wrap:wrap;gap:15px;">
                                        ${event.evidence.map(f => `
                                            <div style="border:1px solid #999;padding:8px;text-align:center;max-width:200px;">
                                                ${f.type.startsWith('image/') ? `<img src="${f.data}" style="max-width:180px;max-height:120px;object-fit:contain;display:block;">` : '<div style="font-size:32px;padding:20px;">📄</div>'}
                                                <div style="font-size:11px;margin-top:5px;word-break:break-all;">${f.name}</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                    <div style="margin-top:40px;padding-top:20px;border-top:2px solid #dc2626;font-size:12px;color:#666;">
                        <p><strong>声明：</strong>本文件由事件时间线系统生成，仅供法律参考使用。</p>
                        <p>共计 ${events.length} 个事件，${events.reduce((s,e)=>s+e.evidence.length,0)} 个证据附件。</p>
                    </div>
                </div>
            `;
            
            await Promise.all(Array.from(printContainer.querySelectorAll('img')).map(img => 
                img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
            ));
            await new Promise(r => setTimeout(r, 500));
            
            try {
                const { jsPDF } = window.jspdf;
                const canvas = await html2canvas(printContainer.firstElementChild, {
                    scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#fff', logging: false
                });
                
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210, pageHeight = 297;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                const doc = new jsPDF('p', 'mm', 'a4');
                let heightLeft = imgHeight, position = 0;
                
                doc.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
                
                while (heightLeft > 0) {
                    position = heightLeft - imgHeight;
                    doc.addPage();
                    doc.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                }
                
                doc.save(`事件时间线_${new Date().toISOString().split('T')[0]}.pdf`);
                showToast('PDF导出成功！', 'success');
            } catch (error) {
                showToast('PDF生成失败: ' + error.message, 'error');
            } finally {
                printContainer.remove();
            }
        }
        
        function updateStats() {
            document.getElementById('totalEvents').textContent = events.length;
            document.getElementById('totalEvidence').textContent = events.reduce((sum, e) => sum + e.evidence.length, 0);
        }
        
        function saveData() {
            localStorage.setItem('timelineEvents', JSON.stringify(events));
        }
        
        function clearAllData() {
            if (!window.confirm('确定要清空所有事件吗？此操作不可恢复。')) return;
            events = [];
            saveData();
            renderTimeline();
            updateStats();
            showToast('所有数据已清空', 'info');
        }
        
        function sortEvents() {
            events.reverse();
            saveData();
            renderTimeline();
            showToast('时间线已倒序排列', 'success');
        }
        
        function showImportExport() {
            document.getElementById('importExportModal').classList.remove('hidden');
        }
        
        function closeImportExport() {
            document.getElementById('importExportModal').classList.add('hidden');
        }
        
        function exportData() {
            const dataStr = JSON.stringify(events, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `事件数据_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据导出成功', 'success');
        }
        
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        events = imported;
                        saveData();
                        renderTimeline();
                        updateStats();
                        showToast('数据导入成功', 'success');
                        closeImportExport();
                    } else throw new Error('格式错误');
                } catch (err) {
                    showToast('导入失败: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
        }
        
        function showToast(message, type = 'info') {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check' : type === 'error' ? 'fa-exclamation' : 'fa-info'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeImageModal();
                closeImportExport();
            }
        });
    </script>
</body>
</html>
