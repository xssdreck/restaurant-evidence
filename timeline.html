<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件时间线 & 证据整理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .timeline-line {
            position: absolute;
            left: 24px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #dc2626, #991b1b);
        }
        .timeline-dot {
            position: absolute;
            left: 16px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            border: 3px solid #dc2626;
            z-index: 10;
        }
        .evidence-card {
            transition: all 0.3s ease;
        }
        .evidence-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .gh-nav {
            background: radial-gradient(1200px 320px at 20% -20%, #dc2626 0%, #991b1b 50%, #7f1d1d 100%);
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #dc2626;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 加载中 -->
    <div id="loadingScreen" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="spinner"></div>
            <p class="text-gray-600">正在检查登录状态...</p>
        </div>
    </div>

    <!-- 未登录提示 -->
    <div id="loginScreen" class="hidden min-h-screen bg-gray-50">
        <div class="login-box">
            <i class="fas fa-lock text-5xl text-red-600 mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">请先登录</h2>
            <p class="text-gray-600 mb-6">事件时间线功能需要登录后才能使用，您的数据将安全保存在云端。</p>
            <a href="./auth.html" class="inline-block px-6 py-3 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition">
                <i class="fas fa-sign-in-alt mr-2"></i>前往登录
            </a>
            <div class="mt-4">
                <a href="./index.html" class="text-gray-500 hover:text-gray-700 text-sm">← 返回首页</a>
            </div>
        </div>
    </div>

    <!-- 主应用界面 -->
    <div id="appScreen" class="hidden">
        <nav class="gh-nav text-white shadow-sm border-b sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center">
                        <i class="fas fa-scale-balanced text-white text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold">事件时间线 & 证据整理</h1>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span id="userEmail" class="text-sm opacity-80 hidden md:inline"></span>
                        <a href="./index.html" class="px-4 py-2 text-white hover:text-gray-200 transition">
                            <i class="fas fa-arrow-left mr-2"></i>返回首页
                        </a>
                        <button onclick="showImportExport()" class="px-4 py-2 text-white hover:text-gray-200 transition">
                            <i class="fas fa-file-import mr-2"></i>导入/导出
                        </button>
                        <button onclick="loadTestData()" class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition shadow-md" title="加载20个事件30个证据的测试数据">
                            <i class="fas fa-flask mr-2"></i>加载测试数据
                        </button>
                        <button onclick="generatePDF()" class="px-4 py-2 bg-white text-red-700 rounded-lg hover:bg-gray-100 transition shadow-md">
                            <i class="fas fa-file-pdf mr-2"></i>导出PDF
                        </button>
                        <button onclick="logout()" class="px-4 py-2 text-white hover:text-gray-200 transition" title="退出登录">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- 左侧：添加事件表单 -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl shadow-md p-6 sticky top-24">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                            <i class="fas fa-plus-circle text-red-600 mr-2"></i>
                            添加事件
                        </h2>
                        
                        <form id="eventForm" class="space-y-4">
                            <input type="hidden" id="editingEventId">
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">日期时间 *</label>
                                <input type="datetime-local" id="eventDate" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">事件标题 *</label>
                                <input type="text" id="eventTitle" placeholder="简要描述事件" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">详细描述</label>
                                <textarea id="eventDesc" rows="4" placeholder="详细描述事件经过..."
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500"></textarea>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <i class="fas fa-paperclip mr-1"></i>证据附件
                                </label>
                                <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-red-500 transition cursor-pointer"
                                     onclick="document.getElementById('evidenceFiles').click()">
                                    <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                                    <p class="text-sm text-gray-600">点击上传图片或文件</p>
                                    <p class="text-xs text-gray-400 mt-1">支持 JPG, PNG, PDF (最大 10MB)</p>
                                </div>
                                <input type="file" id="evidenceFiles" multiple accept="image/*,.pdf"
                                    class="hidden" onchange="handleFileSelect(event)">
                                <div id="fileList" class="mt-2 space-y-1"></div>
                                <div id="uploadProgress" class="hidden mt-2">
                                    <div class="w-full bg-gray-200 rounded-full h-2">
                                        <div id="uploadProgressBar" class="bg-red-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                                    </div>
                                    <p class="text-xs text-gray-500 mt-1">正在上传...</p>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <i class="fas fa-tag mr-1"></i>标签
                                </label>
                                <div class="flex flex-wrap gap-2">
                                    <button type="button" onclick="toggleTag(this, '关键证据')" 
                                        class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">关键证据</button>
                                    <button type="button" onclick="toggleTag(this, '证人证言')" 
                                        class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">证人证言</button>
                                    <button type="button" onclick="toggleTag(this, '视频证据')" 
                                        class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">视频证据</button>
                                    <button type="button" onclick="toggleTag(this, '书面材料')" 
                                        class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">书面材料</button>
                                    <button type="button" onclick="toggleTag(this, '物证')" 
                                        class="tag-btn px-3 py-1 text-xs rounded-full border border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600 transition">物证</button>
                                </div>
                            </div>
                            
                            <div class="flex gap-2">
                                <button type="button" id="cancelEditBtn" onclick="cancelEdit()" 
                                    class="hidden flex-1 py-3 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition">取消</button>
                                <button type="submit" id="submitBtn"
                                    class="flex-1 py-3 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition shadow-md">
                                    <i class="fas fa-save mr-2"></i>保存事件
                                </button>
                            </div>
                        </form>
                        
                        <div class="mt-6 pt-6 border-t border-gray-200">
                            <h3 class="text-sm font-medium text-gray-700 mb-3">统计信息</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-red-50 rounded-lg p-3 text-center">
                                    <div class="text-2xl font-bold text-red-600" id="totalEvents">0</div>
                                    <div class="text-xs text-gray-600">事件总数</div>
                                </div>
                                <div class="bg-orange-50 rounded-lg p-3 text-center">
                                    <div class="text-2xl font-bold text-orange-600" id="totalEvidence">0</div>
                                    <div class="text-xs text-gray-600">证据数量</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧：时间线展示 -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-xl shadow-md p-4 mb-6 flex flex-wrap items-center justify-between gap-4">
                        <div class="flex items-center space-x-4">
                            <span class="text-sm font-medium text-gray-700">筛选：</span>
                            <select id="filterTag" onchange="renderTimeline()" 
                                class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-red-500">
                                <option value="">全部标签</option>
                                <option value="关键证据">关键证据</option>
                                <option value="证人证言">证人证言</option>
                                <option value="视频证据">视频证据</option>
                                <option value="书面材料">书面材料</option>
                                <option value="物证">物证</option>
                            </select>
                            <input type="text" id="searchText" placeholder="搜索事件..." onkeyup="renderTimeline()"
                                class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-red-500">
                        </div>
                    </div>
                    
                    <div id="timelineContainer" class="relative">
                        <div class="timeline-line"></div>
                    </div>
                    
                    <div id="emptyState" class="text-center py-16">
                        <i class="fas fa-clipboard-list text-6xl text-gray-200 mb-4"></i>
                        <h3 class="text-lg font-medium text-gray-600 mb-2">暂无事件记录</h3>
                        <p class="text-gray-400">点击左侧表单添加第一个事件</p>
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="text-center py-6 text-gray-500 text-sm border-t">
            <p>事件时间线 & 证据整理工具 | 数据云端存储 | <span id="footerUser"></span></p>
        </footer>
        
        <!-- 图片预览 -->
        <div id="imageModal" class="fixed inset-0 bg-black bg-opacity-90 z-50 hidden flex items-center justify-center p-4">
            <button onclick="closeImageModal()" class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300">
                <i class="fas fa-times"></i>
            </button>
            <img id="modalImage" src="" alt="预览" class="max-w-full max-h-full rounded-lg shadow-2xl">
        </div>
        
        <!-- 导入导出 -->
        <div id="importExportModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full">
                <div class="px-6 py-4 border-b">
                    <h3 class="text-lg font-semibold">导入/导出数据</h3>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">导出数据 (JSON)</label>
                        <button onclick="exportData()" class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                            <i class="fas fa-download mr-2"></i>下载数据文件
                        </button>
                    </div>
                    <div class="border-t pt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">导入数据</label>
                        <input type="file" id="importFile" accept=".json" onchange="importData(event)"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    </div>
                </div>
                <div class="px-6 py-4 border-t bg-gray-50 rounded-b-xl text-right">
                    <button onclick="closeImportExport()" class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    
    <script>
        // 全局变量
        let sb = null;
        let currentUser = null;
        let events = [];
        let currentFiles = [];
        let existingEvidence = []; // 编辑时保留的已有证据

        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
            
            // 检查登录状态
            const { data: { user } } = await sb.auth.getUser();
            
            if (!user) {
                // 未登录
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('loginScreen').classList.remove('hidden');
                return;
            }
            
            // 已登录
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('footerUser').textContent = '当前用户：' + user.email;
            
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            
            // 加载数据
            await loadEvents();
            
            // 绑定表单提交
            document.getElementById('eventForm').addEventListener('submit', handleSubmit);
        });

        // 加载事件列表
        async function loadEvents() {
            try {
                const { data, error } = await sb
                    .from('timeline_events')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('event_date', { ascending: true });
                
                if (error) throw error;
                
                events = data || [];
                renderTimeline();
                updateStats();
            } catch (err) {
                showToast('加载数据失败: ' + err.message, 'error');
            }
        }

        // 处理表单提交
        async function handleSubmit(e) {
            e.preventDefault();
            
            const editingId = document.getElementById('editingEventId').value;
            const date = document.getElementById('eventDate').value;
            const title = document.getElementById('eventTitle').value.trim();
            const desc = document.getElementById('eventDesc').value.trim();
            const tags = Array.from(document.querySelectorAll('.tag-btn.active')).map(btn => btn.textContent.trim());
            
            if (!date || !title) {
                showToast('请填写日期和标题', 'error');
                return;
            }
            
            // 显示上传进度
            const progressDiv = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('uploadProgressBar');
            progressDiv.classList.remove('hidden');
            progressBar.style.width = '0%';
            
            try {
                // 上传新文件到Storage
                const uploadedEvidence = [...existingEvidence];
                
                for (let i = 0; i < currentFiles.length; i++) {
                    const file = currentFiles[i];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${currentUser.id}/${Date.now()}_${i}.${fileExt}`;
                    
                    progressBar.style.width = `${(i / currentFiles.length) * 50}%`;
                    
                    // 如果是base64图片，需要转换为blob
                    let fileData = file.data;
                    if (fileData.startsWith('data:')) {
                        const response = await fetch(fileData);
                        fileData = await response.blob();
                    }
                    
                    const { data: uploadData, error: uploadError } = await sb.storage
                        .from('timeline-evidence')
                        .upload(fileName, fileData, {
                            contentType: file.type,
                            upsert: false
                        });
                    
                    if (uploadError) throw uploadError;
                    
                    // 获取公开URL
                    const { data: { publicUrl } } = sb.storage
                        .from('timeline-evidence')
                        .getPublicUrl(fileName);
                    
                    uploadedEvidence.push({
                        name: file.name,
                        type: file.type,
                        url: publicUrl,
                        path: fileName
                    });
                    
                    progressBar.style.width = `${50 + ((i + 1) / currentFiles.length) * 50}%`;
                }
                
                // 保存事件数据
                const eventData = {
                    user_id: currentUser.id,
                    user_email: currentUser.email,
                    title: title,
                    description: desc,
                    event_date: new Date(date).toISOString(),
                    tags: tags,
                    evidence: uploadedEvidence
                };
                
                if (editingId) {
                    // 更新
                    const { error } = await sb
                        .from('timeline_events')
                        .update(eventData)
                        .eq('id', editingId)
                        .eq('user_id', currentUser.id);
                    
                    if (error) throw error;
                    showToast('事件已更新', 'success');
                } else {
                    // 新建
                    const { error } = await sb
                        .from('timeline_events')
                        .insert(eventData);
                    
                    if (error) throw error;
                    showToast('事件已添加', 'success');
                }
                
                // 重置表单
                resetForm();
                
                // 重新加载数据
                await loadEvents();
                
            } catch (err) {
                showToast('保存失败: ' + err.message, 'error');
            } finally {
                progressDiv.classList.add('hidden');
                progressBar.style.width = '0%';
            }
        }

        // 重置表单
        function resetForm() {
            document.getElementById('eventForm').reset();
            document.getElementById('editingEventId').value = '';
            currentFiles = [];
            existingEvidence = [];
            document.getElementById('fileList').innerHTML = '';
            document.querySelectorAll('.tag-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-red-100', 'border-red-500', 'text-red-600');
            });
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save mr-2"></i>保存事件';
        }

        // 处理文件选择
        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            const maxSize = 10 * 1024 * 1024; // 10MB
            
            files.forEach(file => {
                if (file.size > maxSize) {
                    showToast(`文件 ${file.name} 超过10MB限制`, 'error');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentFiles.push({
                        name: file.name,
                        type: file.type,
                        data: e.target.result,
                        size: file.size
                    });
                    renderFileList();
                };
                reader.readAsDataURL(file);
            });
            
            // 清空input，允许重复选择相同文件
            event.target.value = '';
        }

        // 渲染文件列表
        function renderFileList() {
            const container = document.getElementById('fileList');
            let html = '';
            
            // 显示已有证据（编辑模式）
            existingEvidence.forEach((file, index) => {
                html += `
                    <div class="flex items-center justify-between bg-green-50 px-3 py-2 rounded-lg text-sm border border-green-200">
                        <div class="flex items-center overflow-hidden">
                            <i class="fas ${getFileIcon(file.type)} text-green-600 mr-2"></i>
                            <span class="truncate">${file.name} (已上传)</span>
                        </div>
                        <button onclick="removeExistingEvidence(${index})" class="text-red-500 hover:text-red-700 ml-2">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
            });
            
            // 显示待上传文件
            html += currentFiles.map((file, index) => `
                <div class="flex items-center justify-between bg-gray-50 px-3 py-2 rounded-lg text-sm">
                    <div class="flex items-center overflow-hidden">
                        <i class="fas ${getFileIcon(file.type)} text-gray-500 mr-2"></i>
                        <span class="truncate">${file.name} (待上传)</span>
                    </div>
                    <button onclick="removeFile(${index})" class="text-red-500 hover:text-red-700 ml-2">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }

        // 获取文件图标
        function getFileIcon(type) {
            if (!type) return 'fa-file';
            if (type.startsWith('image/')) return 'fa-image';
            if (type.includes('pdf')) return 'fa-file-pdf';
            return 'fa-file';
        }

        // 删除待上传文件
        function removeFile(index) {
            currentFiles.splice(index, 1);
            renderFileList();
        }

        // 删除已有证据
        function removeExistingEvidence(index) {
            if (!confirm('确定要删除这个证据文件吗？')) return;
            existingEvidence.splice(index, 1);
            renderFileList();
        }

        // 切换标签
        function toggleTag(btn, tag) {
            btn.classList.toggle('active');
            btn.classList.toggle('bg-red-100');
            btn.classList.toggle('border-red-500');
            btn.classList.toggle('text-red-600');
        }

        // 渲染时间线
        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            const filterTag = document.getElementById('filterTag').value;
            const searchText = document.getElementById('searchText').value.toLowerCase();
            
            let filteredEvents = events.filter(event => {
                const matchTag = !filterTag || (event.tags && event.tags.includes(filterTag));
                const matchSearch = !searchText || 
                    (event.title && event.title.toLowerCase().includes(searchText)) || 
                    (event.description && event.description.toLowerCase().includes(searchText));
                return matchTag && matchSearch;
            });
            
            if (filteredEvents.length === 0) {

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { 
                year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', weekday: 'long' 
            });
        }

        // 转义HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 编辑事件
        async function editEvent(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;
            
            // 填充表单
            document.getElementById('editingEventId').value = event.id;
            
            // 格式化日期时间用于input
            const eventDate = new Date(event.event_date);
            const dateStr = eventDate.toISOString().slice(0, 16);
            document.getElementById('eventDate').value = dateStr;
            
            document.getElementById('eventTitle').value = event.title;
            document.getElementById('eventDesc').value = event.description || '';
            
            // 设置标签
            existingEvidence = event.evidence || [];
            currentFiles = [];
            renderFileList();
            
            document.querySelectorAll('.tag-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-red-100', 'border-red-500', 'text-red-600');
                if (event.tags && event.tags.includes(btn.textContent.trim())) {
                    btn.classList.add('active', 'bg-red-100', 'border-red-500', 'text-red-600');
                }
            });
            
            // 显示取消按钮，修改保存按钮文字
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save mr-2"></i>更新事件';
            
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 取消编辑
        function cancelEdit() {
            resetForm();
        }

        // 删除事件
        async function deleteEvent(id) {
            if (!confirm('确定要删除这个事件吗？相关的证据文件也会被删除。')) return;
            
            try {
                // 先删除关联的文件
                const event = events.find(e => e.id === id);
                if (event && event.evidence) {
                    for (const file of event.evidence) {
                        if (file.path) {
                            await sb.storage.from('timeline-evidence').remove([file.path]);
                        }
                    }
                }
                
                // 删除事件记录
                const { error } = await sb
                    .from('timeline_events')
                    .delete()
                    .eq('id', id)
                    .eq('user_id', currentUser.id);
                
                if (error) throw error;
                
                showToast('事件已删除', 'success');
                await loadEvents();
            } catch (err) {
                showToast('删除失败: ' + err.message, 'error');
            }
        }

                        <p><strong>声明：</strong>本文件由事件时间线系统生成，仅供法律参考使用。</p>
                        <p>共计 ${events.length} 个事件，${events.reduce((s,e)=>s+(e.evidence?e.evidence.length:0),0)} 个证据附件。</p>

            `;
            
            await Promise.all(Array.from(printContainer.querySelectorAll('img')).map(img => 
                img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
            ));
            await new Promise(r => setTimeout(r, 500));
            
            try {
                const { jsPDF } = window.jspdf;
                const canvas = await html2canvas(printContainer.firstElementChild, {
                    scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#fff', logging: false
                });
                
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210, pageHeight = 297;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                const doc = new jsPDF('p', 'mm', 'a4');
                let heightLeft = imgHeight, position = 0;
                
                doc.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
                
                while (heightLeft > 0) {
                    position = heightLeft - imgHeight;
                    doc.addPage();
                    doc.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                }
                
                doc.save(`事件时间线_${new Date().toISOString().split('T')[0]}.pdf`);

                printContainer.remove();
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(events, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `事件数据_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据导出成功', 'success');
        }

        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('格式错误');
                    
                    // 导入到数据库
                    for (const item of imported) {
                        const eventData = {
                            user_id: currentUser.id,
                            user_email: currentUser.email,
                            title: item.title,
                            description: item.description || '',
                            event_date: item.date || item.event_date || new Date().toISOString(),
                            tags: item.tags || [],
                            evidence: item.evidence || []
                        };
                        
                        const { error } = await sb.from('timeline_events').insert(eventData);
                        if (error) throw error;
                    }
                    
                    showToast(`成功导入 ${imported.length} 个事件`, 'success');
                    closeImportExport();
                    await loadEvents();
                } catch (err) {
                    showToast('导入失败: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
        }

                    "tags": ["书面材料", "关键证据"],
                    "evidence": [
                        {"name": "证据清单.pdf", "type": "application/pdf"}
                    ]
                },
                {
                    "title": "事件十九：证人C询问",
                    "description": "询问新发现的证人C，获取新的证言信息，补充证据链条。",
                    "date": "2025-05-01T10:00:00",
                    "tags": ["证人证言"],
                    "evidence": [
                        {"name": "证人C笔录.pdf", "type": "application/pdf"}
                    ]
                },
                {
                    "title": "事件二十：证据移交",
                    "description": "将整理完整的证据材料移交相关部门，完成证据固定和保全工作。",
                    "date": "2025-05-10T15:30:00",
                    "tags": ["关键证据", "书面材料", "物证", "视频证据"],
                    "evidence": [
                        {"name": "移交清单.pdf", "type": "application/pdf"},
                        {"name": "移交照片.jpg", "type": "image/jpeg", "url": "https://via.placeholder.com/300x200?text=移交照片"}
                    ]
                }
            ];
            
            showToast('正在导入测试数据...', 'info');
            
            try {
                let successCount = 0;
                for (const item of testData) {
                    const eventData = {
                        user_id: currentUser.id,
                        user_email: currentUser.email,
                        title: item.title,
                        description: item.description || '',
                        event_date: new Date(item.date).toISOString(),
                        tags: item.tags || [],
                        evidence: item.evidence || []
                    };
                    
                    const { error } = await sb.from('timeline_events').insert(eventData);
                    if (error) {
                        console.error('导入失败:', error);
                    } else {
                        successCount++;
                    }
                }
                
                showToast(`成功导入 ${successCount} 个测试事件！`, 'success');
                await loadEvents();
            } catch (err) {
                showToast('导入失败: ' + err.message, 'error');
            }
        }

        // Toast提示
        function showToast(message, type = 'info') {
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check' : type === 'error' ? 'fa-exclamation' : 'fa-info'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeImageModal();
                closeImportExport();
            }
        });
    </script>
</body>
</html>
