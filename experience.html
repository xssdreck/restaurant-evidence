<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>投稿中心｜登录投稿 + 管理员审核</title>
  <meta name="description" content="投稿需登录，管理员审核通过后自动显示在首页。" />
  <style>
    :root{--bg:#f8fafc;--card:#fff;--border:#e5e7eb;--muted:#6b7280}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;background:var(--bg);color:#111827}
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin:12px 0}
    .muted{color:var(--muted);font-size:14px}
    .btn{display:inline-block;background:#111827;color:#fff;text-decoration:none;padding:9px 13px;border-radius:10px;margin-right:8px}
    .btn.secondary{background:#fff;color:#111827;border:1px solid var(--border)}
    code{background:#eef2ff;padding:2px 6px;border-radius:6px}
    .story{border-top:1px dashed #d1d5db;padding-top:10px;margin-top:10px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>投稿中心（登录投稿 + 审核发布）</h1>
  <p class="muted">投稿需登录本站账号。每个账号仅限一篇投稿，发布后先进入待审核，管理员审核通过后自动显示在首页。</p>

  <div class="card">
    <h3>1) 投稿入口（需要登录）</h3>
    <p class="muted">点击后进入投稿页面；未登录请先登录。</p>
    <a class="btn" href="./submit.html">我要投稿</a>
    <a class="btn secondary" href="./auth.html">登录/注册</a>
  </div>

  <div class="card">
    <h3>2) 管理员审核</h3>
    <p class="muted">管理员在后台审核投稿，通过后将自动展示到首页。</p>
    <a class="btn secondary" href="./admin.html">进入管理员审核后台</a>
  </div>

  <div class="card">
    <h3>3) 已审核通过（预览）</h3>
    <div id="list">加载中...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<script>
const list = document.getElementById('list');
async function loadApproved(){
  try{
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    const { data, error } = await sb
      .from('stories')
      .select('id,title,content,user_email,created_at')
      .eq('status', 'approved')
      .order('created_at', { ascending: false })
      .limit(20);
    
    if(error) throw error;
    
    if(!data || !data.length){
      list.innerHTML = '<p class="muted">暂无审核通过内容。</p>'; 
      return;
    }
    
    list.innerHTML = data.map((it,idx)=>`
      <article class="story">
        <div><strong>${idx+1}. ${(it.title||'未命名').replace(/</g,'&lt;')}</strong></div>
        <div class="muted">作者：${(it.user_email||'匿名').replace(/</g,'&lt;')} · ${new Date(it.created_at).toLocaleString('zh-CN')}</div>
        <p>${(it.content||'').slice(0,220).replace(/</g,'&lt;').replace(/\n/g,'<br>')}...</p>
      </article>
    `).join('');
  }catch(e){
    list.innerHTML = '<p class="muted">加载失败，请稍后刷新。</p>';
  }
}
loadApproved();
</script>
</body>
</html>
