<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的经历｜免登录协同编辑</title>
  <meta name="description" content="免登录协同编辑页面，仅密码进入，实时保存。" />
  <style>
    :root{--bg:#f8fafc;--card:#fff;--border:#e5e7eb;--muted:#6b7280}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;background:var(--bg);color:#111827}
    .wrap{max-width:1080px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:12px 0}
    .muted{color:var(--muted);font-size:14px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input{padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;min-width:220px}
    button{padding:10px 14px;border:none;border-radius:10px;background:#111827;color:#fff;font-weight:700;cursor:pointer}
    .ok{color:#065f46}.err{color:#b91c1c}
    iframe{width:100%;height:78vh;border:1px solid var(--border);border-radius:12px;background:#fff}
    .hidden{display:none}
    code{background:#eef2ff;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>我的经历（免登录协同编辑）</h1>
  <p class="muted">模式：仅密码进入、无需账号、无需审核、实时保存。请仅记录可核验事实。</p>

  <section class="card" id="gate">
    <h3>输入编辑密码</h3>
    <div class="row">
      <input id="pwd" type="password" placeholder="请输入编辑密码" />
      <button id="enter">进入编辑</button>
      <span id="msg" class="muted"></span>
    </div>
  </section>

  <section class="card hidden" id="editorWrap">
    <h3>协同编辑器（实时自动保存）</h3>
    <p class="muted">多人可同时编辑。建议按“时间 / 地点 / 经过 / 证据编号 / 信息备注”结构填写。</p>
    <div class="row" style="margin:8px 0 10px;">
      <button id="saveTxt">保存并下载 TXT</button>
      <button id="saveHtml">保存并下载 HTML</button>
      <span id="saveMsg" class="muted">按钮用于手动导出备份（编辑器本身会自动保存）。</span>
    </div>
    <iframe id="pad" src="about:blank" title="collab-editor"></iframe>
    <p class="muted" style="margin-top:10px;">如无法加载，可直接打开：<a target="_blank" href="https://etherpad.wikimedia.org/p/restaurant-evidence-story-1031xpp">Etherpad 协同文档</a></p>
  </section>
</div>

<script>
  const PASS = '1031xpp';
  const PAD_ID = 'restaurant-evidence-story-1031xpp';
  const PAD_URL = `https://etherpad.wikimedia.org/p/${PAD_ID}?showControls=true&showChat=true&showLineNumbers=true&useMonospaceFont=false`;

  const gate = document.getElementById('gate');
  const editorWrap = document.getElementById('editorWrap');
  const pad = document.getElementById('pad');
  const msg = document.getElementById('msg');

  function unlock(){
    gate.classList.add('hidden');
    editorWrap.classList.remove('hidden');
    pad.src = PAD_URL;
    sessionStorage.setItem('exp_unlocked','1');
  }

  document.getElementById('enter').onclick = () => {
    const val = document.getElementById('pwd').value;
    if(val === PASS){
      msg.className='ok';
      msg.textContent='验证通过，正在进入编辑器...';
      unlock();
    }else{
      msg.className='err';
      msg.textContent='密码错误';
    }
  };

  document.getElementById('saveTxt').onclick = () => {
    window.open(`https://etherpad.wikimedia.org/p/${PAD_ID}/export/txt`, '_blank');
  };
  document.getElementById('saveHtml').onclick = () => {
    window.open(`https://etherpad.wikimedia.org/p/${PAD_ID}/export/html`, '_blank');
  };

  if(sessionStorage.getItem('exp_unlocked') === '1'){
    unlock();
  }
</script>
</body>
</html>
