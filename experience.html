<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的经历｜协同编辑页面</title>
  <meta name="description" content="免登录协同编辑经历页面。" />
  <style>
    :root{--bg:#f8fafc;--card:#fff;--border:#e5e7eb;--muted:#6b7280;--brand:#1d4ed8}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;background:var(--bg);color:#111827}
    .wrap{max-width:1080px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:12px 0}
    .muted{color:var(--muted);font-size:14px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input{padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;min-width:220px}
    button{padding:10px 14px;border:none;border-radius:10px;background:#111827;color:#fff;font-weight:700;cursor:pointer}
    .ok{color:#065f46}.err{color:#b91c1c}
    iframe{width:100%;height:78vh;border:1px solid var(--border);border-radius:12px;background:#fff}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="wrap">
  <h1>我的经历（协同编辑）</h1>
  <p class="muted">免登录协同编辑：输入编辑密码后可直接编辑。请只填写可核验事实，不要发布身份证号、住址、电话等敏感信息。</p>

  <section class="card" id="gate">
    <h3>输入编辑密码</h3>
    <div class="row">
      <input id="pwd" type="password" placeholder="请输入编辑密码" />
      <button id="enter">进入编辑</button>
      <span id="msg" class="muted"></span>
    </div>
  </section>

  <section class="card hidden" id="editorWrap">
    <h3>协同编辑器（实时）</h3>
    <p class="muted">多人可同时编辑。建议按“时间 / 地点 / 经过 / 证据编号 / 信息备注”格式记录。</p>
    <iframe id="pad" src="about:blank" title="collab-editor"></iframe>
  </section>
</div>

<script>
  // 按你的要求：编辑密码
  const PASS = '1031xpp';
  const PAD_URL = 'https://etherpad.wikimedia.org/p/restaurant-evidence-story-1031xpp?showControls=true&showChat=true&showLineNumbers=true&useMonospaceFont=false';

  const gate = document.getElementById('gate');
  const editorWrap = document.getElementById('editorWrap');
  const pad = document.getElementById('pad');
  const msg = document.getElementById('msg');

  function unlock(){
    gate.classList.add('hidden');
    editorWrap.classList.remove('hidden');
    pad.src = PAD_URL;
    sessionStorage.setItem('exp_unlocked','1');
  }

  document.getElementById('enter').onclick = () => {
    const val = document.getElementById('pwd').value;
    if(val === PASS){
      msg.className='ok';
      msg.textContent='验证通过，正在进入编辑器...';
      unlock();
    }else{
      msg.className='err';
      msg.textContent='密码错误';
    }
  };

  if(sessionStorage.getItem('exp_unlocked') === '1'){
    unlock();
  }
</script>
</body>
</html>
